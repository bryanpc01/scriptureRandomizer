<!doctype html>
<html lang="en" class="bg-navy-deep">
  <head>
    <!-- Google Tag Manager -->
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-5R747PD3');</script>
    <!-- End Google Tag Manager -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              navy:  { DEFAULT: '#1a1a2e', deep: '#0f3460' },
              brand: { DEFAULT: '#e8651a', light: '#f07840' },
              gold:  '#c9a84c',
              cream: '#f5f0e8',
              muted: '#9e8f7e',
            },
            fontFamily: {
              serif: ['"Playfair Display"', 'Georgia', 'serif'],
              sans:  ['Inter', 'system-ui', 'sans-serif'],
            },
          }
        }
      }
    </script>
    <link rel="stylesheet" href="mainStyle.css">
    <title>Scripture Randomizer</title>
  </head>
  <body class="min-h-screen font-sans text-cream">
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-5R747PD3"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->

    <!-- Profile bar -->
    <div class="fixed top-0 right-0 z-50 flex items-center gap-2.5 p-3">
      <span id="profileGreeting" class="text-xs font-medium text-muted"></span>
      <button id="profileBtn"
        class="flex h-9 w-9 cursor-pointer items-center justify-center rounded-full border border-brand/25 bg-white/5 backdrop-blur-sm transition-colors hover:border-brand focus:outline-none"
        title="Profile">
        <span id="profileAvatar" class="avatar leading-none">&#9786;</span>
      </button>
    </div>

    <!-- Main -->
    <main class="mx-auto flex w-full max-w-md flex-col items-center gap-5 px-4 pb-14 pt-16">

      <!-- Hero -->
      <div class="pb-2 pt-8 text-center">
        <div class="hero-emblem mb-4 leading-none text-brand">&#10014;</div>
        <h1 class="font-serif text-[2rem] font-semibold leading-tight tracking-tight text-cream">Scripture Randomizer</h1>
        <p class="mt-2 text-sm text-muted">Let the Word guide your reading today</p>
      </div>

      <!-- Options card -->
      <div class="w-full rounded-2xl border border-brand/20 bg-white/[0.06] p-5 backdrop-blur-sm flex flex-col gap-4">

        <div class="flex flex-col gap-2">
          <span class="text-[0.6rem] font-semibold uppercase tracking-widest text-muted">Testament</span>
          <div class="pill-group" role="group">
            <input type="radio" class="pill-check" name="testament" id="testamentBoth" value="both" checked>
            <label class="pill" for="testamentBoth">Both</label>
            <input type="radio" class="pill-check" name="testament" id="testamentOld" value="old">
            <label class="pill" for="testamentOld">Old</label>
            <input type="radio" class="pill-check" name="testament" id="testamentNew" value="new">
            <label class="pill" for="testamentNew">New</label>
          </div>
        </div>

        <div class="flex flex-col gap-2">
          <span class="text-[0.6rem] font-semibold uppercase tracking-widest text-muted">Reading Amount</span>
          <div class="pill-group" role="group">
            <input type="radio" class="pill-check" name="reading" id="readingLight" value="light">
            <label class="pill" for="readingLight">Light<span class="pill-sub">1–2 ch</span></label>
            <input type="radio" class="pill-check" name="reading" id="readingMedium" value="medium" checked>
            <label class="pill" for="readingMedium">Medium<span class="pill-sub">3–5 ch</span></label>
            <input type="radio" class="pill-check" name="reading" id="readingHeavy" value="heavy">
            <label class="pill" for="readingHeavy">Heavy<span class="pill-sub">6+ ch</span></label>
          </div>
        </div>

        <button id="randomizer" type="button"
          class="randomize-btn mt-1 flex w-full items-center justify-center gap-2 rounded-xl py-3.5 text-sm font-semibold tracking-wide text-white transition-all hover:brightness-110 active:scale-[0.98] focus:outline-none">
          <span class="randomize-btn-text">Randomize</span>
          <span class="randomize-btn-icon">&#10070;</span>
        </button>

      </div>

      <!-- Result card -->
      <div id="resultCard" class="hidden w-full rounded-2xl border border-brand/20 bg-white/[0.06] p-5 backdrop-blur-sm">
        <p class="mb-0.5 text-[0.6rem] font-semibold uppercase tracking-widest text-muted">Today's Reading</p>
        <p class="mb-3 text-[0.7rem] italic text-muted/70">Read it, then mark it done.</p>
        <h2 id="readingTitle" class="font-serif text-xl font-semibold leading-snug text-cream"></h2>
        <div class="mb-4 mt-1 flex items-center justify-between gap-2">
          <p id="randomBook" class="text-sm font-semibold text-brand"></p>
          <a id="bibleLink" href="#" target="_blank" rel="noopener"
            class="flex shrink-0 items-center gap-1 rounded-full border border-brand/20 px-2.5 py-1 text-[0.65rem] font-medium text-muted transition-colors hover:border-brand/50 hover:text-cream">
            Bible.com ↗
          </a>
        </div>
        <div id="readingContext" class="mb-4 rounded-xl border border-white/[0.06] bg-white/[0.04] p-3.5">
          <span id="contextTheme" class="mb-2 block text-[0.55rem] font-semibold uppercase tracking-widest text-gold"></span>
          <p id="contextPrompt" class="text-xs leading-relaxed text-muted"></p>
        </div>
        <button id="markReadBtn"
          class="randomize-btn mb-2.5 flex w-full items-center justify-center gap-2 rounded-xl py-3 text-sm font-semibold text-white transition-all hover:brightness-110 active:scale-[0.98] focus:outline-none">
          <span>&#10003;</span>
          <span>I Read This</span>
        </button>
        <button id="starBtn"
          class="star-btn flex w-full items-center justify-center gap-2 rounded-xl border border-white/10 bg-transparent py-2.5 text-xs font-semibold text-muted transition-all hover:border-gold/40 hover:text-gold focus:outline-none"
          disabled>
          <span class="star-icon">&#9733;</span>
          <span class="star-label">Save to Starred</span>
        </button>
      </div>

      <!-- History toggle -->
      <div class="flex w-full justify-center">
        <button id="toggleHistoryBtn"
          class="hidden flex items-center gap-2 rounded-full border border-brand/20 px-5 py-2 text-xs font-semibold text-muted transition-all hover:border-brand/40 hover:text-cream focus:outline-none">
          <span id="toggleHistoryLabel">Reading History</span>
          <span id="toggleHistoryArrow" class="toggle-arrow">&#9660;</span>
        </button>
      </div>

      <!-- History drawer -->
      <div id="historySection"
        class="hidden w-full overflow-hidden rounded-2xl border border-brand/20 bg-white/[0.06] backdrop-blur-sm">
        <div class="flex border-b border-white/[0.08]">
          <button class="history-tab active flex-1 py-3 text-xs font-semibold transition-all" id="logTab" data-target="logPanel">Log</button>
          <button class="history-tab flex-1 py-3 text-xs font-semibold transition-all" id="starredTab" data-target="starredPanel">Starred</button>
        </div>
        <div id="logPanel" class="history-panel" style="max-height:280px;overflow-y:auto">
          <ul id="logList" class="history-list"></ul>
          <div class="border-t border-white/[0.06] p-2">
            <button id="clearLogBtn" class="w-full rounded-lg py-2 text-[0.7rem] font-medium text-muted transition-colors hover:text-brand">Clear Log</button>
          </div>
        </div>
        <div id="starredPanel" class="history-panel" style="max-height:280px;overflow-y:auto;display:none">
          <ul id="starredList" class="history-list"></ul>
          <div class="border-t border-white/[0.06] p-2">
            <button id="clearStarredBtn" class="w-full rounded-lg py-2 text-[0.7rem] font-medium text-muted transition-colors hover:text-brand">Clear Starred</button>
          </div>
        </div>
      </div>

    </main>

    <!-- Profile modal -->
    <div id="profileModal"
      class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4 backdrop-blur-sm">
      <div class="w-full max-w-xs rounded-2xl border border-brand/25 bg-navy p-6 flex flex-col gap-4">
        <h5 class="font-serif text-lg font-semibold text-cream">Your Profile</h5>
        <div class="flex flex-col gap-1.5">
          <label for="profileName" class="text-xs font-medium text-muted">Name</label>
          <input type="text" id="profileName"
            class="w-full rounded-xl border border-brand/20 bg-white/[0.07] px-3.5 py-2.5 text-sm text-cream outline-none transition-colors focus:border-brand/50 placeholder:text-muted"
            placeholder="Enter your name">
        </div>
        <div class="flex justify-end gap-2">
          <button id="profileCancel"
            class="rounded-xl border border-white/10 px-4 py-2 text-xs font-semibold text-muted transition-all hover:border-brand/30 hover:text-cream focus:outline-none">Cancel</button>
          <button id="profileSave"
            class="randomize-btn rounded-xl px-4 py-2 text-xs font-semibold text-white transition-all hover:brightness-110 focus:outline-none">Save</button>
        </div>
      </div>
    </div>

    <script src="mainScript.js"></script>
  </body>
</html>
